# 일일 파이프라인: 데이터 수집 → 온톨로지 계산 → 인사이트/제안 → 정적 빌드 → Pages 배포
# 트리거: 평일 23:30 UTC (US 마감 후, KST 08:30) + 수동
name: daily-pipeline

on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pipeline-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml

      - name: HuggingFace 모델 캐시 (multilingual-e5-small)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-e5-small-v1

      - name: 파이프라인 설치
        run: pip install -e "pipeline[ml,backtest]"

      - name: 일일 파이프라인 실행
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python -m ontoquant.run_daily --stage all

      - name: 데이터 커밋
        run: |
          git config user.name "ontoquant-pipeline"
          git config user.email "pipeline@users.noreply.github.com"
          git add data dashboard/public/data
          git diff --cached --quiet || git commit -m "pipeline: daily run $(date -u +%F) [skip ci]"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: 대시보드 빌드 (정적 export)
        working-directory: dashboard
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/out

      - uses: actions/deploy-pages@v4
