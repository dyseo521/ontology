# 수동 publish 경로: MCP publish(git push) 또는 대시보드/스키마 변경 시 재배포만 수행
name: deploy-dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "data/writeback/**"
      - "ontology/**"
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: 대시보드 빌드
        working-directory: dashboard
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/out

      - uses: actions/deploy-pages@v4
