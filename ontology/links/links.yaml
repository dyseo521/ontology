# 링크 타입 정의 — 그래프 순회의 엣지. from/to는 Object Type 또는 Interface apiName.
linkTypes:
  - apiName: portfolioPositions
    displayName: 보유 포지션
    from: Portfolio
    to: Position
    cardinality: ONE_TO_MANY

  - apiName: positionInstrument
    displayName: 대상 종목
    from: Position
    to: Instrument
    cardinality: MANY_TO_ONE

  - apiName: instrumentExposures
    displayName: 팩터 익스포저
    from: Instrument
    to: FactorExposure
    cardinality: ONE_TO_MANY

  - apiName: exposureFactor
    displayName: 대상 팩터
    from: FactorExposure
    to: Factor
    cardinality: MANY_TO_ONE

  - apiName: eventAffectsInstrument
    displayName: 이벤트→종목 영향
    from: Event
    to: Instrument
    cardinality: MANY_TO_MANY
    properties:
      relevance:
        type: double
        description: "0~1. DIRECT=1.0"
      method:
        type: string
        enum: [DIRECT, EMBEDDING, MAPPING]

  - apiName: eventDrivesFactor
    displayName: 이벤트→팩터 영향
    from: Event
    to: Factor
    cardinality: MANY_TO_MANY
    properties:
      relevance:
        type: double
      method:
        type: string
        enum: [DIRECT, EMBEDDING, MAPPING]

  - apiName: insightFromEvent
    displayName: 근거 이벤트
    from: Insight
    to: Event
    cardinality: MANY_TO_MANY

  - apiName: insightAboutInstrument
    displayName: 관련 종목
    from: Insight
    to: Instrument
    cardinality: MANY_TO_MANY

  - apiName: proposalFromInsight
    displayName: 근거 인사이트
    from: RebalanceProposal
    to: Insight
    cardinality: MANY_TO_MANY

  - apiName: proposalValidatedBy
    displayName: 검증 실행
    from: RebalanceProposal
    to: EvaluationRun
    cardinality: MANY_TO_ONE

  - apiName: modelEvaluations
    displayName: 평가 이력
    from: ModelVersion
    to: EvaluationRun
    cardinality: ONE_TO_MANY

  - apiName: decisionOnProposal
    displayName: 결재 대상
    from: Decision
    to: RebalanceProposal
    cardinality: MANY_TO_ONE

  - apiName: metricScopePortfolio
    displayName: 지표 스코프(포트폴리오)
    from: RiskMetric
    to: Portfolio
    cardinality: MANY_TO_ONE

  - apiName: metricScopePosition
    displayName: 지표 스코프(포지션)
    from: RiskMetric
    to: Position
    cardinality: MANY_TO_ONE

  - apiName: similarEvent
    displayName: 유사 이벤트
    from: Event
    to: Event
    cardinality: MANY_TO_MANY
    properties:
      similarity:
        type: double
