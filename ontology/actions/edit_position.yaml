# Action Type: 포지션 편집 (매수/매도/신규/청산) — writeback: portfolio.json
apiName: editPosition
displayName: 포지션 편집
description: 포트폴리오의 보유 수량/단가를 변경한다. quantity 0이면 청산.
parameters:
  portfolioId:
    type: objectRef
    objectType: Portfolio
    bind: portfolio
    required: true
    default: main
  instrumentId:
    type: objectRef
    objectType: Instrument
    bind: instrument
    required: true
  quantity:
    type: double
    required: true
    description: "변경 후 총 보유 수량 (delta 아님). 0 = 청산"
  avgCostLocal:
    type: double
    required: false
    description: "미지정 시 기존 단가 유지 (신규 포지션이면 필수)"
  note:
    type: string
    required: false
submissionCriteria:
  - condition: "params.quantity >= 0"
    failureMessage: "수량은 음수가 될 수 없습니다 (공매도 미지원)."
  - condition: "instrument != None"
    failureMessage: "유니버스에 없는 종목입니다. 먼저 Instrument를 등록하세요."
rules:
  - type: functionRule
    function: apply_position_edit
    description: "portfolio.json writeback — 신규/수정/삭제를 원자적으로 반영"
sideEffects:
  - type: auditLog
  - type: notification
    channel: dashboard-feed
    template: "포지션 변경: {instrument.name} → {params.quantity}주"
