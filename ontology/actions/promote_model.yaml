# Action Type: 모델 승격 — Release 패턴 (STAGING → PRODUCTION)
apiName: promoteModel
displayName: 모델 버전 승격
description: STAGING 모델을 PRODUCTION으로 승격한다. 게이트 통과 EvaluationRun 2회 이상 필요.
parameters:
  modelVersionId:
    type: objectRef
    objectType: ModelVersion
    bind: model
    required: true
  reason:
    type: string
    required: true
submissionCriteria:
  - condition: "model.stage == 'STAGING'"
    failureMessage: "STAGING 상태의 모델만 승격할 수 있습니다."
  - condition: "passed_eval_count(model.modelVersionId) >= 2"
    failureMessage: "게이트를 통과한 EvaluationRun이 2회 이상 필요합니다."
  - condition: "model.modelId != 'rebalance-strategy' or passed_wf_count(model.modelId) >= 1"
    failureMessage: "리밸런싱 전략은 walk-forward(OOS) 검증 통과 1회 이상이 필요합니다."
rules:
  - type: functionRule
    function: promote_model_version
    description: "기존 PRODUCTION 동일 modelId를 ARCHIVED로, 대상은 PRODUCTION으로"
sideEffects:
  - type: auditLog
  - type: notification
    channel: dashboard-feed
    template: "모델 승격: {params.modelVersionId} → PRODUCTION"
