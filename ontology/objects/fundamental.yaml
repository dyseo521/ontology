apiName: Fundamental
displayName: 분기 재무
description: 분기 주요 계정 (DART 전체 재무제표 / SEC companyfacts). 재무 인사이트의 원천.
icon: file-spreadsheet
color: surface-soft
status: ACTIVE
primaryKey: fundamentalId
titleProperty: fundamentalId
properties:
  fundamentalId:
    type: string
    description: "{companyId}:{period} 예: KR:00266961:2026Q1"
