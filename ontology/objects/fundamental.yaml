    type: string
  period:
    type: string
    description: "예: 2026Q1"
  fiscalDate:
    type: date
    nullable: true
    description: "분기 말일"
  revenue:
    type: double
    nullable: true
    owner: PIPELINE
  operatingIncome:
    type: double
    nullable: true
    owner: PIPELINE
  netIncome:
    type: double
    nullable: true
    owner: PIPELINE
  totalAssets:
    type: double
    nullable: true
    owner: PIPELINE
  totalLiabilities:
    type: double
    nullable: true
    owner: PIPELINE
  totalEquity:
    type: double
    nullable: true
    owner: PIPELINE
  currency:
    type: string
    enum: [KRW, USD]
  source:
    type: string
    enum: [DART, SEC]
