apiName: DisclosureEvent
displayName: 공시 이벤트
description: DART/SEC 공시. Event 인터페이스 구현.
icon: file-text
color: block-pink
status: ACTIVE
implements: [Event]
primaryKey: eventId
titleProperty: title
properties:
  rcpNo:
    type: string
    nullable: true
    description: "DART 접수번호 또는 EDGAR accession number"
  corpCode:
    type: string
    nullable: true
  filingType:
    type: string
    nullable: true
    description: "DART 공시유형 또는 8-K 등 SEC form type"
  filingDetail:
    type: string
    nullable: true
    description: "DART 상세유형 또는 8-K item 코드 (예: 2.02)"
  market:
    type: string
    enum: [KR, US]
  # ── 지분 공시 방향 (DART elestock/majorstock 조인, signal-model v2 insider 알파) ──
  ownerDirection:
    type: string
    nullable: true
    enum: [BUY, SELL, NEUTRAL]
    owner: PIPELINE
    description: "증감주수 부호 (임원·주요주주/5%룰)"
  ownerNetShares:
    type: double
    nullable: true
    owner: PIPELINE
  ownerNetRatio:
    type: double
    nullable: true
    owner: PIPELINE
    description: "지분 증감 %p"
  reporter:
    type: string
    nullable: true
    owner: PIPELINE
  reporterRole:
    type: string
    nullable: true
    owner: PIPELINE
