apiName: NewsEvent
displayName: 뉴스 이벤트
description: RSS 뉴스 (Yahoo per-ticker / DART todayRSS). Event 인터페이스 구현.
icon: rss
color: block-pink
status: ACTIVE
implements: [Event]
primaryKey: eventId
titleProperty: title
properties:
  publisher:
    type: string
    nullable: true
  feedSource:
    type: string
    enum: [YAHOO_RSS, DART_RSS, NAVER_NEWS, PRESS_RSS]
  tickerHint:
    type: string
    nullable: true
    description: "피드 조회에 사용한 티커"
  sentiment:
    type: double
    nullable: true
    owner: PIPELINE
    description: "-1(부정) ~ +1(긍정), KR-FinBERT"
  sentimentLabel:
    type: string
    nullable: true
    enum: [POSITIVE, NEGATIVE, NEUTRAL]
    owner: PIPELINE
  dupCount:
    type: integer
    nullable: true
    owner: PIPELINE
    description: "임베딩 dedupe 로 병합된 유사 기사 수"
