# 투자 유니버스 마스터 — 사람이 편집하는 정본. seed가 Sector/Instrument 오브젝트로 구체화.
# dartCorpCode 는 ingest(corp_map)가 corpCode.xml 로 자동 해석 (null 유지).
# v2: KR 13 + US 13, 11개 섹터. 삼성전자/SK하이닉스는 유니버스 잔류(데이터·이벤트 표본), 포트폴리오만 제외.

