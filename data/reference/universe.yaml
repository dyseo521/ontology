factors:
  # ── 스타일 (Ken French, 일간 %) ───────────────────────
  - factorId: "FF:MKT"
    name: "US Market (Mkt-RF)"
    nameKo: "미국 시장"
    factorType: MARKET
    source: KEN_FRENCH
    sourceSeriesId: "Mkt-RF"
    unit: PCT
    transform: LEVEL
    regressionGroup: US_STYLE
    lagForKr: 1
  - factorId: "FF:SMB"
    name: "Size (SMB)"
    nameKo: "사이즈"
    factorType: STYLE
    source: KEN_FRENCH
    sourceSeriesId: "SMB"
    unit: PCT
    transform: LEVEL
    regressionGroup: US_STYLE
  - factorId: "FF:HML"
    name: "Value (HML)"
    nameKo: "밸류"
    factorType: STYLE
    source: KEN_FRENCH
    sourceSeriesId: "HML"
    unit: PCT
    transform: LEVEL
    regressionGroup: US_STYLE
  - factorId: "FF:MOM"
    name: "Momentum (MOM)"
    nameKo: "모멘텀"
    factorType: STYLE
    source: KEN_FRENCH
    sourceSeriesId: "Mom"
    unit: PCT
    transform: LEVEL
    regressionGroup: US_STYLE
  # ── KR 시장 (KODEX 200 프록시) ───────────────────────
  - factorId: "KR:MKT"
    name: "Korea Market (KODEX 200 proxy)"
    nameKo: "한국 시장"
    factorType: MARKET
    source: NAVER
    sourceSeriesId: "069500"
    unit: RATIO
    transform: PCT_RETURN
    regressionGroup: KR_CORE
    lagForKr: 0
  # ── 매크로 (FRED) ────────────────────────────────────
  - factorId: "MACRO:DGS10"
    name: "US 10Y Treasury Yield"
    nameKo: "미국 10년 금리"
    factorType: MACRO
    source: FRED
    sourceSeriesId: "DGS10"
    unit: PCT
    transform: DIFF
    regressionGroup: US_MACRO
  - factorId: "MACRO:DGS2"
    name: "US 2Y Treasury Yield"
    nameKo: "미국 2년 금리"
    factorType: MACRO
    source: FRED
    sourceSeriesId: "DGS2"
    unit: PCT
    transform: DIFF
    regressionGroup: NONE
  - factorId: "MACRO:T10Y2Y"
    name: "10Y-2Y Spread"
    nameKo: "장단기 스프레드"
    factorType: MACRO
    source: FRED
    sourceSeriesId: "T10Y2Y"
    unit: PCT
    transform: DIFF
    regressionGroup: NONE
  - factorId: "MACRO:VIX"
    name: "VIX"
    nameKo: "VIX 변동성"
    factorType: MACRO
    source: FRED
    sourceSeriesId: "VIXCLS"
    unit: LEVEL
    transform: LOGRET
    regressionGroup: US_MACRO
  - factorId: "MACRO:HY_OAS"
    name: "US High Yield OAS"
    nameKo: "하이일드 스프레드"
    factorType: MACRO
    source: FRED
    sourceSeriesId: "BAMLH0A0HYM2"
    unit: PCT
    transform: DIFF
    regressionGroup: NONE
  - factorId: "MACRO:USDKRW"
    name: "USD/KRW"
    nameKo: "원달러 환율"
    factorType: MACRO
    source: FRED
    sourceSeriesId: "DEXKOUS"
    unit: LEVEL
